# Publishes to npm with a provenance statement (required for n8n verified
# community nodes since 2026-05-01). Triggers when you publish a GitHub Release.

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # REQUIRED: lets npm attach the provenance statement
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20 # npm 9.5+ ships with Node 20 → provenance supported
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# Setup, one time:
# 1. Create an npm "Automation" (or granular) access token with publish rights.
# 2. Add it to the repo: Settings > Secrets and variables > Actions > New secret,
#    name it NPM_TOKEN.
# 3. To release: bump version (npm version patch/minor/major), push the tag,
#    then create a GitHub Release for that tag — this workflow runs and publishes
#    with provenance. Confirm the npm page shows the "Provenance" badge.
